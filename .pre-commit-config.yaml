repos:
  # Python formatting
  - repo: https://github.com/psf/black
    rev: 23.9.1
    hooks:
      - id: black
        language_version: python3.12
        files: \.py$

  # Python import sorting
  - repo: https://github.com/PyCQA/isort
    rev: 5.12.0
    hooks:
      - id: isort
        language_version: python3.12
        files: \.py$

  # Python linting
  - repo: https://github.com/pycqa/flake8
    rev: 6.1.0
    hooks:
      - id: flake8
        additional_dependencies: [flake8-bugbear]
        files: \.py$

  # Whitespace and sanity checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-added-large-files

  # Commitizen
  - repo: https://github.com/commitizen-tools/commitizen
    rev: v4.9.1
    hooks:
      - id: commitizen

  # C++ formatting
  - repo: local
    hooks:
      - id: clang-format
        name: "Format C++ files with clang-format"
        entry: clang-format -i
        language: system
        files: \.(cpp|h|hpp|cxx)$

  # License header add/check
  - repo: local
    hooks:
      - id: add-license-headers
        name: "Add or check license headers"
        entry: python scripts/add_license_headers.py
        language: system
        pass_filenames: true
        files: \.(py|sh|md|cpp|h|hpp)$
