name: Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      # 1. Checkout the repository
      - uses: actions/checkout@v4

      # 2. Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: 3.12

      # 3. Install dependencies
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install poetry
          poetry install
          poetry add --dev commitizen

      # 4. Run tests
      - name: Run tests
        run: poetry run pytest --cov=typelefter tests/

      # 5. Lint code
      - name: Lint code
        run: poetry run flake8 typelefter tests/

      # 6. Bump version and update changelog
      - name: Bump version & update changelog
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          poetry run cz bump --yes

      # 7. Push version bump and changelog
      - name: Push changes
        uses: ad-m/github-push-action@v0.10.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          branch: main
